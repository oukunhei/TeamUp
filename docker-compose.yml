version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: teamup-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: teamup
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: teamup-redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: teamup-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: teamup-server
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/teamup?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      PORT: 3000
      NODE_ENV: development
      CLIENT_URL: http://localhost:5173
      STORAGE_ENDPOINT: minio
      STORAGE_PORT: 9000
      STORAGE_USE_SSL: "false"
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
      STORAGE_BUCKET: teamup
    ports:
      - "3000:3000"
    volumes:
      - ./server:/app
      - /app/node_modules
      - server_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    command: sh -c "npx prisma migrate dev --name init && npm run dev"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: teamup-client
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:3000
    command: npm run dev -- --host

volumes:
  postgres_data:
  minio_data:
  server_uploads:
